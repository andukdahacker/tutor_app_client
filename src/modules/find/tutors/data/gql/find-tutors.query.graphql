query FindManyTutors($findManyTutorProfilesInput: FindManyTutorProfilesInput!) {
  tutorProfiles(findManyTutorProfilesInput: $findManyTutorProfilesInput) {
    nodes {
      bio
      id
      tutorProfileSubjects {
        subject {
          description
          id
          name
        }
      }
      user {
        username
        updatedAt
        isVerified
        id
        email
        createdAt
        avatar
      }
    }
  }
}
