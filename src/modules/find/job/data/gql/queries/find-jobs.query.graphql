query FindManyJobs($findManyJobsInput: FindManyJobsInput!) {
  jobs(findManyJobsInput: $findManyJobsInput) {
    nodes {
      id
      learner {
        userId
        id
        bio
      }
      subject {
        id
        name
        description
      }
      title
      description
      fee
      numberOfSessions
      createdAt
    }
  }
}
