query FindManyJobs($findManyJobsInput: FindManyJobsInput!) {
  jobs(findManyJobsInput: $findManyJobsInput) {
    nodes {
      id
      learner {
        userId
        id
        bio
      }
      subject {
        id
        name
        description
      }
      createdAt
      updatedAt
      fee
      description
      numberOfSessions
      title
    }
    pageInfo {
      cursor {
        ... on StringCursor {
          value
        }
      }
      hasNextPage
      lastTake
      totalAmount
    }
  }
}
